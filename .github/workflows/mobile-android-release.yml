name: Mobile Android Release Bundle

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  android-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Install dependencies
        run: npm ci

      - name: Decode Android upload keystore
        run: |
          python - <<'PY'
          import base64
          import os
          import re
          import sys
          from pathlib import Path

          raw = os.environ.get("ANDROID_KEYSTORE_BASE64", "")
          clean = re.sub(r"\s+", "", raw)
          print(f"ANDROID_KEYSTORE_BASE64 characters: {len(clean)}")

          if not clean:
              print("ANDROID_KEYSTORE_BASE64 is empty. Check the repository secret name and value.", file=sys.stderr)
              sys.exit(1)

          try:
              decoded = base64.b64decode(clean, validate=True)
          except Exception as exc:
              print(f"ANDROID_KEYSTORE_BASE64 is not valid base64: {exc}", file=sys.stderr)
              sys.exit(1)

          if not decoded:
              print("Decoded keystore is empty.", file=sys.stderr)
              sys.exit(1)

          Path("android/app/upload-keystore.jks").write_bytes(decoded)
          print(f"Decoded keystore bytes: {len(decoded)}")
          PY
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Build web assets
        run: npm run build
        env:
          VITE_BASE_PATH: /
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Sync Android shell
        run: npx cap sync android

      - name: Build signed Android App Bundle
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew bundleRelease --no-daemon
        env:
          ANDROID_KEYSTORE_PATH: app/upload-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload release App Bundle
        uses: actions/upload-artifact@v6
        with:
          name: PantryPal-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 14
